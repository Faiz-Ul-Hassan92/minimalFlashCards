<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcards</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>Flashcards</h1>
    <nav>
      <button id="btn-view"  class="nav-btn active">My Cards</button>
      <button id="btn-add"   class="nav-btn">Add Card</button>
      <button id="btn-quiz"  class="nav-btn">Quiz Mode</button>
    </nav>
  </header>

  <main>

    <!-- ===================== VIEW: card list ===================== -->
    <section id="view-list">
      <div id="deck-filter">
        <label for="filter-deck">Deck:</label>
        <input id="filter-deck" type="text" placeholder="all" />
        <button id="btn-filter">Filter</button>
      </div>
      <div id="card-list">
        <!-- cards injected here by app.js -->
      </div>
    </section>

    <!-- ===================== VIEW: add / edit form ===================== -->
    <section id="view-form" class="hidden">
      <h2 id="form-title">Add Card</h2>
      <input type="hidden" id="edit-id" />

      <label for="input-question">Question</label>
      <textarea id="input-question" rows="3" placeholder="What is the question?"></textarea>

      <label for="input-answer">Answer</label>
      <textarea id="input-answer" rows="3" placeholder="What is the answer?"></textarea>

      <label for="input-deck">Deck (optional)</label>
      <input id="input-deck" type="text" placeholder="e.g. biology" />

      <div class="form-actions">
        <button id="btn-save">Save</button>
        <button id="btn-cancel" class="secondary">Cancel</button>
      </div>
    </section>

    <!-- ===================== VIEW: quiz mode ===================== -->
    <section id="view-quiz" class="hidden">
      <div id="quiz-controls">
        <label for="quiz-deck">Deck:</label>
        <input id="quiz-deck" type="text" placeholder="all" />
        <button id="btn-start-quiz">Start</button>
      </div>
      <div id="quiz-card" class="hidden">
        <div id="quiz-question"></div>
        <div id="quiz-answer" class="hidden"></div>
        <button id="btn-reveal">Reveal Answer</button>
        <div id="quiz-feedback" class="hidden">
          <button id="btn-known"    class="known">Got it</button>
          <button id="btn-unknown"  class="unknown">Still learning</button>
        </div>
      </div>
      <div id="quiz-done" class="hidden">
        <p id="quiz-score"></p>
        <button id="btn-quiz-again">Again</button>
      </div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
